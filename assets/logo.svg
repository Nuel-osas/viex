<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Inner glow -->
  <circle cx="256" cy="256" r="220" fill="url(#inner)" opacity="0.3"/>

  <!-- V shape (main mark) -->
  <path d="M160 148L256 364L352 148" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Cross-border lines (representing global transfer) -->
  <path d="M176 280L336 280" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <path d="M196 310L316 310" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.3"/>

  <!-- Diamond accent (treasury vault) -->
  <path d="M256 120L274 148L256 176L238 148Z" fill="url(#accent)" opacity="0.9"/>

  <!-- Gradients -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <radialGradient id="inner" cx="256" cy="256" r="220">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="238" y1="120" x2="274" y2="176">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
  </defs>
</svg>
